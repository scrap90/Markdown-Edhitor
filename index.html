<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowEdit - プレミアム・マークダウンエディタ</title>
    <meta name="description" content="リアルタイムプレビュー、スクロール同期、ダークモード、ファイル保存機能を備えた、完全オフラインで動作する高機能マークダウンエディタ">
    <!-- Local CSS files (offline availability) -->
    <link href="libs/prism-tomorrow.min.css" rel="stylesheet" id="prism-theme">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Main Header -->
        <header class="app-header">
            <div class="header-left">
                <!-- SVG: edit_note (Brand) with a11y attributes -->
                <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor" class="brand-icon" aria-hidden="true" focusable="false">
                    <path d="M3 10h11v2H3zm0-4h11v2H3zm0 8h7v2H3zm16-1.07L14.75 18H13v-1.75l4.23-4.23 1.77 1.76M20.71 11c.2-.2.2-.51 0-.71l-1.06-1.06a.495.495 0 0 0-.7 0l-.88.88 1.77 1.77.87-.88z"/>
                </svg>
                <h1 class="app-title">GlowEdit</h1>
                <div class="file-status">
                    <!-- SVG: description with a11y attributes -->
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" aria-hidden="true" focusable="false">
                        <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
                    </svg>
                    <span id="current-filename">新規ドキュメント.md</span>
                    <span id="save-indicator" class="unsaved-badge">未保存の変更</span>
                </div>
            </div>
            <div class="header-right">
                <!-- Document Statistics -->
                <div class="doc-stats">
                    <span class="stat-item">単語数: <strong id="stat-words">0</strong></span>
                    <span class="stat-item">文字数: <strong id="stat-chars">0</strong></span>
                    <span class="stat-item">読了予測: <strong id="stat-read-time">0</strong> 分</span>
                </div>
                <!-- Theme Toggle -->
                <button id="theme-toggle" class="btn-icon" aria-label="ダーク/ライトモード切り替え" title="ダーク/ライトモード切り替え">
                    <!-- SVG: dark_mode -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" class="theme-icon-dark" aria-hidden="true" focusable="false">
                        <path d="M9.37 5.51A7.354 7.354 0 0 0 9.35 12a7.354 7.354 0 0 0 6.49 6.49 7.49 7.49 0 0 1-6.47-12.98M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c.44-.06.9-.1 1.36-.1H12z"/>
                    </svg>
                    <!-- SVG: light_mode -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" class="theme-icon-light" style="display: none;" aria-hidden="true" focusable="false">
                        <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 0 0 0-1.41l-1.06-1.06zm-12.37 2.12a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zm12.37-14.5a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Toolbar -->
        <section class="app-toolbar" aria-label="ツールバー">
            <div class="toolbar-group file-operations">
                <button id="btn-open" class="btn-tool" title="ファイルを開く (Ctrl+O)" aria-label="ファイルを開く">
                    <!-- SVG: folder_open -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true" focusable="false">
                        <path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-1 12H5c-.55 0-1-.45-1-1V8c0-.55.45-1 1-1h14c.55 0 1 .45 1 1v9c0 .55-.45 1-1 1z"/>
                    </svg>
                    <span class="btn-text">開く</span>
                </button>
                <button id="btn-save" class="btn-tool" title="ファイルを保存 (Ctrl+S)" aria-label="ファイルを保存">
                    <!-- SVG: save -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true" focusable="false">
                        <path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/>
                    </svg>
                    <span class="btn-text">保存</span>
                </button>
                <button id="btn-save-as" class="btn-tool" title="別名で保存" aria-label="別名で保存">
                    <!-- SVG: save_as -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true" focusable="false">
                        <path d="M17 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4zm4 4h-2v2h2v-2z"/>
                    </svg>
                    <span class="btn-text">別名で保存</span>
                </button>
                <button id="btn-export-html" class="btn-tool" title="HTMLファイルとして書き出す" aria-label="HTML書き出し">
                    <!-- SVG: file-text-document -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true" focusable="false">
                        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                    </svg>
                    <span class="btn-text">HTML書き出し</span>
                </button>
                <button id="btn-print" class="btn-tool" title="ドキュメントを印刷 / PDFで保存 (Ctrl+P)" aria-label="印刷">
                    <!-- SVG: print -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true" focusable="false">
                        <path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/>
                    </svg>
                    <span class="btn-text">印刷</span>
                </button>
                <button id="btn-copy" class="btn-tool" title="クリップボードにコピー (Ctrl+C / Cmd+C)" aria-label="コピー">
                    <!-- SVG: content_copy -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true" focusable="false">
                        <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                    </svg>
                    <span class="btn-text">コピー</span>
                </button>
            </div>
            <div class="toolbar-divider"></div>
            <div class="toolbar-group edit-actions">
                <button id="btn-bold" class="btn-tool" title="太字 (Ctrl+B)" aria-label="太字">
                    <!-- SVG: format_bold -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true" focusable="false">
                        <path d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM10 6.5h3c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-3v-3zm3.5 9h-3.5v-3h3.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5z"/>
                    </svg>
                </button>
                <button id="btn-italic" class="btn-tool" title="斜体 (Ctrl+I)" aria-label="斜体">
                    <!-- SVG: format_italic -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true" focusable="false">
                        <path d="M10 4v3h2.21l-3.42 8H6v3h8v-3h-2.21l3.42-8H18V4h-8z"/>
                    </svg>
                </button>
                <button id="btn-heading" class="btn-tool" title="見出し (Ctrl+D)" aria-label="見出し">
                    <!-- SVG: title -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true" focusable="false">
                        <path d="M5 4v3h5.5v12h3V7H19V4H5z"/>
                    </svg>
                </button>
                <button id="btn-link" class="btn-tool" title="リンクの挿入 (Ctrl+K)" aria-label="リンクの挿入">
                    <!-- SVG: insert_link -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true" focusable="false">
                        <path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/>
                    </svg>
                </button>
                <button id="btn-image" class="btn-tool" title="画像の挿入" aria-label="画像の挿入">
                    <!-- SVG: insert_photo -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true" focusable="false">
                        <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                    </svg>
                </button>
                <button id="btn-code" class="btn-tool" title="コードブロックの挿入" aria-label="コードブロックの挿入">
                    <!-- SVG: code -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true" focusable="false">
                        <path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/>
                    </svg>
                </button>
                <button id="btn-quote" class="btn-tool" title="引用の挿入" aria-label="引用の挿入">
                    <!-- SVG: format_quote -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true" focusable="false">
                        <path d="M6 17h3l2-4V7H5v6h3zm8 0h3l2-4V7h-6v6h3z"/>
                    </svg>
                </button>
                <button id="btn-list-ul" class="btn-tool" title="箇条書きリスト" aria-label="箇条書きリスト">
                    <!-- SVG: format_list_bulleted -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true" focusable="false">
                        <path d="M4 10.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm0-6c-.83 0-1.5.67-1.5 1.5S3.17 7.5 4 7.5 5.5 6.83 5.5 6 4.83 4.5 4 4.5zm0 12c-.83 0-1.5.68-1.5 1.5s.68 1.5 1.5 1.5 1.5-.68 1.5-1.5-.67-1.5-1.5-1.5zM7 19h14v-2H7v2zm0-6h14v-2H7v2zm0-7v2h14V6H7z"/>
                    </svg>
                </button>
                <button id="btn-list-ol" class="btn-tool" title="番号付きリスト" aria-label="番号付きリスト">
                    <!-- SVG: format_list_numbered -->
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true" focusable="false">
                        <path d="M2 17h2v.5H3v1h1v.5H2v1h3v-4H2v1zm1-9h1V4H2v1h1v3zm-1 3h1.8L2 13.1v.9h3v-1H3.2L5 10.9v-.9H2v1zm5-6v2h14V6H7zm0 7h14v-2H7v2zm0 6h14v-2H7v2z"/>
                    </svg>
                </button>
            </div>
            <!-- Mobile Toggle Tab (only visible on mobile) -->
            <div class="mobile-tabs">
                <button id="tab-edit" class="tab-btn active">エディタ</button>
                <button id="tab-preview" class="tab-btn">プレビュー</button>
            </div>
        </section>

        <!-- Main Working Area -->
        <main class="app-main">
            <!-- Editor Pane -->
            <section class="pane editor-pane" id="editor-section">
                <div class="pane-header">
                    <span class="pane-title">マークダウン入力</span>
                    <span class="keyboard-hint">Ctrl+B: 太字 | Ctrl+I: 斜体 | Ctrl+D: 見出し</span>
                </div>
                <div class="editor-container">
                    <textarea id="markdown-textarea" placeholder="ここにマークダウンを入力してください..." spellcheck="false" autocomplete="off"></textarea>
                </div>
            </section>

            <!-- Resizer Splitter (desktop only) -->
            <div class="pane-resizer" id="pane-resizer"></div>

            <!-- Preview Pane -->
            <section class="pane preview-pane" id="preview-section">
                <div class="pane-header">
                    <span class="pane-title">プレビュー表示</span>
                    <button class="scroll-lock-toggle" id="scroll-sync-toggle" title="スクロール同期を切り替え" aria-label="スクロール同期を切り替え">
                        <!-- SVG: sync -->
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true" focusable="false">
                            <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46A7.93 7.93 0 0 0 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74A7.93 7.93 0 0 0 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/>
                        </svg>
                        <span class="toggle-label">同期オン</span>
                    </button>
                </div>
                <div class="preview-container scroller" id="preview-container">
                    <article id="preview-output" class="markdown-body">
                        <!-- Rendered Markdown goes here -->
                    </article>
                </div>
            </section>
        </main>
    </div>

    <!-- Hidden Input for Image Upload -->
    <input type="file" id="image-file-input" accept="image/*" style="display: none;">

    <!-- Local Libraries (Offline compatibility) -->
    <script src="libs/marked.min.js"></script>
    <script src="libs/purify.min.js"></script>
    <script src="libs/prism.min.js"></script>
    <script src="libs/prism-markdown.min.js"></script>
    
    <!-- Main Application Logic -->
    <script src="app.js"></script>
</body>
</html>
